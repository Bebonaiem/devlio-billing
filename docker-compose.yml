version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gamebilling-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - ./storage:/var/www/html/storage
    depends_on:
      - db
      - redis
    networks:
      - gamebilling

  db:
    image: mysql:8.0
    container_name: gamebilling-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-gamebilling}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_USER: ${DB_USERNAME:-gamebilling}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - gamebilling

  redis:
    image: redis:alpine
    container_name: gamebilling-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - gamebilling

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gamebilling-queue
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    volumes:
      - .:/var/www/html
      - ./storage:/var/www/html/storage
    depends_on:
      - app
      - db
      - redis
    networks:
      - gamebilling

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gamebilling-scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan schedule:run --verbose --no-interaction
    volumes:
      - .:/var/www/html
      - ./storage:/var/www/html/storage
    depends_on:
      - app
      - db
      - redis
    networks:
      - gamebilling

volumes:
  db_data:

networks:
  gamebilling:
    driver: bridge
