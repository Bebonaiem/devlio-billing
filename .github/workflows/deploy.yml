name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /var/www/devlio-billing

            git pull origin main

            export COMPOSER_ALLOW_SUPERUSER=1
            composer install --no-interaction --optimize-autoloader --no-dev

            php artisan migrate --force

            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan event:cache

            php artisan storage:link

            sudo chown -R www-data:www-data /var/www/devlio-billing
            sudo chmod -R 755 /var/www/devlio-billing/storage
            sudo chmod -R 755 /var/www/devlio-billing/bootstrap/cache

            sudo supervisorctl restart devlio-billing-worker:*

            echo "Deployment complete!"
